<!doctype html>
<html lang="id" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <style>
      /* ==================== VARIABLES & THEME ==================== */
      :root {
        --bg-color: #f8fafc;
        --text-main: #0f172a;
        --text-muted: #64748b;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --card-bg: rgba(255, 255, 255, 0.7);
        --border-color: rgba(0, 0, 0, 0.1);
        --shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --radius: 16px;
        --transition: all 0.3s ease;
      }

      [data-theme="dark"] {
        --bg-color: #0f172a;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --primary: #60a5fa;
        --primary-hover: #3b82f6;
        --card-bg: rgba(30, 41, 59, 0.7);
        --border-color: rgba(255, 255, 255, 0.1);
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
      }

      /* ==================== GLOBAL ==================== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        scroll-behavior: smooth;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.6;
        transition: var(--transition);
        overflow-x: hidden;
      }

      /* Custom Cursor */
      /* ==================== CUSTOM CURSOR: MATAHARI ==================== */
      .cursor {
        width: 16px;
        height: 16px;
        /* Membuat warna inti terang dan tepi oranye */
        background: radial-gradient(circle, #ffffff 10%, #f8ff95 90%);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        /* Efek cahaya berpendar */
        box-shadow:
          0 0 10px #fffc42,
          0 0 20px #ffd152;
        transition:
          width 0.3s,
          height 0.3s,
          background 0.3s,
          box-shadow 0.3s;
      }

      /* State saat Hover: Matahari bersinar terang dan akan meledak */
      .cursor.hovering {
        width: 50px;
        height: 50px;
        /* Inti menjadi putih sangat terang, tepi menjadi merah/oranye intens */
        background: radial-gradient(
          circle,
          #ffffff 15%,
          #fff7b1 40%,
          #fffed1 90%
        );
        box-shadow:
          0 0 20px #ffeb3b,
          0 0 40px #f44336,
          0 0 60px #ffffff;
        /* Memanggil animasi bergetar/berdenyut cepat */
        animation: explodePulse 0.09s infinite alternate;
      }

      /* Animasi berdenyut cepat menyerupai energi yang tidak stabil */
      @keyframes explodePulse {
        0% {
          transform: translate(-50%, -50%) scale(0.9);
          filter: brightness(1);
        }
        100% {
          transform: translate(-50%, -50%) scale(1.1);
          filter: brightness(1.4);
        }
      }

        background-color: var(--primary);

        transform: translate(-50%, -50%);
        transition:
          width 0.3s cubic-bezier(0.25, 1, 0.5, 1),

      .cursor.hovering {

        height: 50px;

      /* Loading Screen */
      #loader {
        position: fixed;
        inset: 0;
        background: var(--bg-color);
        z-index: 10000;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid var(--border-color);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }

      /* Typography & Utility */
      h1,
      h2,
      h3 {
        color: var(--text-main);
      }
      .section-title {
        text-align: center;
        font-size: 2.5rem;
        margin-bottom: 3rem;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }
      section {
        padding: 100px 0;
      }

      /* Glassmorphism Card */
      .glass-card {
        background: var(--card-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 20px;
        transition: var(--transition);
      }
      .glass-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      /* Buttons & Ripple */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 24px;
        border-radius: 30px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: var(--transition);
        position: relative;
        overflow: hidden;
        text-decoration: none;
      }
      .btn-primary {
        background: var(--primary);
        color: white;
      }
      .btn-primary:hover {
        background: var(--primary-hover);
      }
      .btn-outline {
        background: transparent;
        border: 2px solid var(--primary);
        color: var(--primary);
      }
      .btn-outline:hover {
        background: var(--primary);
        color: white;
      }

      .ripple {
        position: absolute;
        border-radius: 50%;
        transform: scale(0);
        animation: ripple-anim 0.6s linear;
        background-color: rgba(255, 255, 255, 0.4);
      }
      @keyframes ripple-anim {
        to {
          transform: scale(4);
          opacity: 0;
        }
      }

      /* Animations */
      .fade-in {
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.8s ease,
          transform 0.8s ease;
      }
      .fade-in.visible {
        opacity: 1;
        transform: translateY(0);
      }

      /* ==================== NAVBAR ==================== */
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border-color);
        transition: var(--transition);
      }
      .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .logo {
        font-size: 1.5rem;
        font-weight: bold;
        color: var(--primary);
        text-decoration: none;
      }
      .nav-links {
        display: flex;
        gap: 20px;
        list-style: none;
      }
      .nav-links a {
        color: var(--text-main);
        text-decoration: none;
        font-weight: 500;
        transition: var(--transition);
        position: relative;
      }
      .nav-links a::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 0;
        background-color: var(--primary);
        transition: var(--transition);
      }
      .nav-links a:hover::after,
      .nav-links a.active::after {
        width: 100%;
      }
      .nav-links a:hover,
      .nav-links a.active {
        color: var(--primary);
      }

      .nav-actions {
        display: flex;
        gap: 15px;
        align-items: center;
      }
      .theme-toggle {
        background: none;
        border: none;
        font-size: 1.2rem;
        cursor: pointer;
        color: var(--text-main);
      }

      .hamburger {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        border: none;
        background: transparent;
      }
      .hamburger span {
        width: 25px;
        height: 3px;
        background: var(--text-main);
        transition: 0.3s;
      }

      /* ==================== HERO ==================== */
      #hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding-top: 80px;
      }
      .hero-img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 20px;
        border: 4px solid var(--primary);
      }
      .hero-name {
        font-size: 3rem;
        margin-bottom: 10px;
      }
      .hero-prof {
        font-size: 1.5rem;
        color: var(--primary);
        margin-bottom: 20px;
        min-height: 36px;
      }
      .hero-desc {
        max-width: 600px;
        margin: 0 auto 30px auto;
        color: var(--text-muted);
      }
      .hero-btns {
        display: flex;
        gap: 15px;
        justify-content: center;
      }

      /* ==================== ABOUT & SKILLS ==================== */
      .about-content {
        text-align: center;
        max-width: 800px;
        margin: 0 auto;
        font-size: 1.1rem;
        color: var(--text-muted);
      }

      .skills-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
      }
      .skill-item {
        margin-bottom: 15px;
      }
      .skill-info {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .progress-bar {
        width: 100%;
        height: 10px;
        background: var(--border-color);
        border-radius: 5px;
        overflow: hidden;
      }
      .progress {
        height: 100%;
        background: var(--primary);
        border-radius: 5px;
        width: 0;
        transition: width 1.5s ease-in-out;
      }

      /* ==================== TIMELINE (EXPERIENCE & EDUCATION) ==================== */
      .timeline {
        position: relative;
        max-width: 800px;
        margin: 0 auto;
      }
      .timeline::before {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 100%;
        background: var(--border-color);
      }
      .timeline-item {
        width: 50%;
        padding: 20px 40px;
        position: relative;
      }
      .timeline-item:nth-child(odd) {
        left: 0;
        text-align: right;
      }
      .timeline-item:nth-child(even) {
        left: 50%;
      }
      .timeline-dot {
        width: 20px;
        height: 20px;
        background: var(--primary);
        border-radius: 50%;
        position: absolute;
        top: 30px;
        right: -10px;
        z-index: 1;
      }
      .timeline-item:nth-child(even) .timeline-dot {
        left: -10px;
      }
      .timeline-date {
        color: var(--primary);
        font-weight: bold;
        margin-bottom: 10px;
      }

      /* ==================== PROJECTS ==================== */
      .project-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        flex-wrap: wrap;
        gap: 15px;
      }
      .filter-btns {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .filter-btn {
        padding: 8px 16px;
        border: 1px solid var(--border-color);
        background: transparent;
        color: var(--text-main);
        border-radius: 20px;
        cursor: pointer;
        transition: var(--transition);
      }
      .filter-btn.active,
      .filter-btn:hover {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }
      .search-box {
        padding: 10px 20px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        background: var(--card-bg);
        color: var(--text-main);
        outline: none;
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 30px;
      }
      .project-card {
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .project-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        transition: transform 0.5s;
      }
      .project-card:hover .project-img {
        transform: scale(1.05);
      }
      .project-body {
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }
      .project-tags {
        font-size: 0.8rem;
        color: var(--primary);
        margin-bottom: 10px;
      }
      .project-title {
        margin-bottom: 10px;
      }
      .project-desc {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 20px;
        flex-grow: 1;
      }
      .project-actions {
        display: flex;
        gap: 10px;
      }

      /* ==================== STATISTICS ==================== */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        text-align: center;
      }
      .stat-number {
        font-size: 3rem;
        font-weight: bold;
        color: var(--primary);
        margin-bottom: 10px;
      }

      /* ==================== CERTIFICATES ==================== */
      .cert-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }
      .cert-card img {
        width: 100%;
        border-radius: 8px;
        margin-bottom: 15px;
      }

      /* ==================== TESTIMONIALS ==================== */
      .testimonial-slider {
        max-width: 600px;
        margin: 0 auto;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      .testi-slide {
        display: none;
        animation: fadeIn 0.5s;
      }
      .testi-slide.active {
        display: block;
      }
      .testi-text {
        font-style: italic;
        font-size: 1.1rem;
        margin-bottom: 20px;
      }
      .testi-author {
        font-weight: bold;
        color: var(--primary);
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* ==================== CONTACT & FOOTER ==================== */
      .contact-grid {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
      }
      .contact-item {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: var(--text-main);
        font-size: 1.1rem;
        transition: var(--transition);
        padding: 15px 25px;
        border-radius: 30px;
      }
      .contact-item:hover {
        color: var(--primary);
        background: var(--border-color);
      }
      .contact-icon {
        width: 24px;
        height: 24px;
        fill: currentColor;
      }

      footer {
        text-align: center;
        padding: 30px;
        border-top: 1px solid var(--border-color);
        margin-top: 50px;
        color: var(--text-muted);
      }
      .footer-actions {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 15px;
      }

      /* ==================== MODAL & TOAST ==================== */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 2000;
        justify-content: center;
        align-items: center;
        padding: 20px;
        opacity: 0;
        transition: opacity 0.3s;
      }
      .modal.active {
        display: flex;
        opacity: 1;
      }
      .modal-content {
        background: var(--bg-color);
        width: 100%;
        max-width: 600px;
        border-radius: var(--radius);
        padding: 30px;
        position: relative;
        transform: translateY(-50px);
        transition: transform 0.3s;
        max-height: 90vh; /* Membatasi tinggi maksimal 90% layar */
      }
      .modal.active .modal-content {
        transform: translateY(0);
      }
      .close-modal {
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 1.5rem;
        cursor: pointer;
        background: none;
        border: none;
        color: var(--text-main);
      }

      /* ==================== TOAST (IPHONE STYLE) ==================== */
      .toast-container {
        position: fixed;
        top: 25px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
        pointer-events: none; /* Agar tidak mengganggu klik di sekitarnya */
      }

      .toast {
        background: rgba(20, 20, 20, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: #ffffff;
        padding: 14px 24px;
        border-radius: 50px; /* Bentuk kapsul ala Dynamic Island */
        box-shadow:
          0 15px 35px rgba(0, 0, 0, 0.2),
          0 0 0 1px rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.3px;
        transform-origin: top center;
        animation:
          dynamicIslandDrop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
          dynamicIslandHide 0.5s 3.5s cubic-bezier(0.36, 0, 0.66, -0.56)
            forwards;
      }

      /* Penyesuaian tema jika di Light/Dark Mode */
      [data-theme="dark"] .toast {
        background: rgba(240, 240, 240, 0.85);
        color: #000000;
        box-shadow:
          0 15px 35px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(0, 0, 0, 0.1);
      }

      @keyframes dynamicIslandDrop {
        0% {
          transform: translateY(-50px) scale(0.5);
          opacity: 0;
        }
        100% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
      @keyframes dynamicIslandHide {
        0% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translateY(-50px) scale(0.5);
          opacity: 0;
        }
      }

        border-left: 4px solid var(--primary);

      @keyframes fadeOut {

      /* Back to top */
      #back-to-top {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: var(--primary);
        color: white;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: none;
        font-size: 1.2rem;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 999;
        box-shadow: var(--shadow);
        transition: var(--transition);
      }
      #back-to-top:hover {
        transform: translateY(-5px);
        background: var(--primary-hover);
      }

      /* ==================== MEDIA QUERIES & PRINT ==================== */
      @media (max-width: 768px) {
        .hamburger {
          display: flex;
        }
        .nav-links {
          position: fixed;
          top: 70px;
          right: -100%;
          flex-direction: column;
          background: var(--card-bg);
          backdrop-filter: blur(15px);
          width: 100%;
          text-align: center;
          padding: 20px 0;
          transition: 0.3s;
          border-bottom: 1px solid var(--border-color);
        }
        .nav-links.active {
          right: 0;
        }
        .timeline::before {
          left: 30px;
        }
        .timeline-item {
          width: 100%;
          padding-left: 70px;
          padding-right: 20px;
        }
        .timeline-item:nth-child(even),
        .timeline-item:nth-child(odd) {
          left: 0;
          text-align: left;
        }
        .timeline-dot {
          left: 20px !important;
        }
        .cursor {
          display: none;
        } /* Disable custom cursor on mobile */
      }

      @media print {
        body {
          background: white;
          color: black;
        }
        nav,
        #back-to-top,
        .theme-toggle,
        .project-controls,
        .contact-item {
          display: none !important;
        }
        .glass-card {
          border: 1px solid #ccc;
          box-shadow: none;
          break-inside: avoid;
        }
        .timeline::before {
          left: 0;
        }
        section {
          padding: 20px 0;
          page-break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <div id="loader"><div class="spinner"></div></div>

    <div class="cursor" id="cursor"></div>

    <div class="toast-container" id="toast-container"></div>

    <nav id="navbar">
      <div class="nav-container">
        <a href="#" class="logo" id="nav-logo">Portofolio.</a>
        <ul class="nav-links" id="nav-links"></ul>
        <div class="nav-actions">
          <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21 12.79A9 9 0 1 1 11.21 3c0 .34.02.67.06 1A7 7 0 0 0 20 12.73c.33.04.66.06 1 .06z"
              />

      const initObservers = () => {
        const sections = document.querySelectorAll("section");
        const navItems = document.querySelectorAll(".nav-links a");

        // Observer untuk Fade In & Animasi khusus section
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("visible");

                // Animasi Progress Bar di section skills
                if (entry.target.id === "skills") {
                  entry.target.querySelectorAll(".progress").forEach((bar) => {
                    bar.style.width = bar.getAttribute("data-width");
                  });
                }

                // Animasi Counter di section statistics
                if (
                  entry.target.id === "statistics" &&
                  !entry.target.dataset.counted
                ) {
                  entry.target.dataset.counted = true;
                  entry.target
                    .querySelectorAll(".stat-number")
                    .forEach((counter) => {
                      const target = +counter.getAttribute("data-target");
                      let count = 0;
                      const updateCount = () => {
                        const inc = target / 50;
                        if (count < target) {
                          count += inc;
                          counter.innerText = Math.ceil(count);
                          setTimeout(updateCount, 30);
                        } else {
                          counter.innerText = target;
                        }
                      };
                      updateCount();
                    });
                }
              }
            });
          },
          { threshold: 0.15 },
        );

        sections.forEach((sec) => observer.observe(sec));

        // Observer untuk Scroll Spy (Highlight menu aktif)
        window.addEventListener("scroll", () => {
          let current = "";
          sections.forEach((sec) => {
            const secTop = sec.offsetTop;
            if (scrollY >= secTop - 200) current = sec.getAttribute("id");
          });

          navItems.forEach((li) => {
            li.classList.remove("active");
            if (li.getAttribute("href").includes(current)) {
              li.classList.add("active");
            }
          });

          // Tampilkan/Sembunyikan Back To Top
          const btt = document.getElementById("back-to-top");
          if (scrollY > 500) btt.style.display = "flex";
          else btt.style.display = "none";
        });
      };

      // 3.4. Typing Animation
      const initTyping = () => {
        const el = document.getElementById("typing-text");
        const words = portfolio.profile.profession;
        let i = 0,
          j = 0,
          isDeleting = false;

        const type = () => {
          const currentWord = words[i];
          if (isDeleting) {
            el.textContent = currentWord.substring(0, j - 1);
            j--;
          } else {
            el.textContent = currentWord.substring(0, j + 1);
            j++;
          }

          let speed = isDeleting ? 50 : 100;

          if (!isDeleting && j === currentWord.length) {
            speed = 2000; // Pause at end of word
            isDeleting = true;
          } else if (isDeleting && j === 0) {
            isDeleting = false;
            i = (i + 1) % words.length; // Next word
            speed = 500; // Pause before typing next
          }
          setTimeout(type, speed);
        };
        type();
      };

      // 3.5. Project Filter & Search
      const initProjectFilters = () => {
        const filterBtns = document.querySelectorAll(".filter-btn");
        const searchBox = document.getElementById("search-project");
        const container = document.getElementById("project-container");

        const filterProjects = () => {
          const activeCat = document
            .querySelector(".filter-btn.active")
            .getAttribute("data-filter");
          const searchTerm = searchBox.value.toLowerCase();

          const filtered = portfolio.projects.filter((p) => {
            const matchCat = activeCat === "Semua" || p.category === activeCat;
            const matchSearch =
              p.title.toLowerCase().includes(searchTerm) ||
              p.description.toLowerCase().includes(searchTerm);
            return matchCat && matchSearch;
          });

          container.innerHTML = generateProjectCards(filtered);

          // Re-init ripple & modal on new elements
          initRipple();
          initModalListeners();

          // Add tiny delay for animation
          setTimeout(() => {
            container
              .querySelectorAll(".project-card")
              .forEach((card) => card.classList.add("visible"));
          }, 50);
        };

        filterBtns.forEach((btn) => {
          btn.addEventListener("click", (e) => {
            filterBtns.forEach((b) => b.classList.remove("active"));
            e.target.classList.add("active");
            filterProjects();
          });
        });

        searchBox.addEventListener("input", filterProjects);

        filterProjects();
      };

      // 3.6. Custom Cursor
      const initCursor = () => {
        const cursor = document.getElementById("cursor");
        if (window.innerWidth <= 768) return; // Disable on mobile

        window.addEventListener("mousemove", (e) => {
          cursor.style.left = e.clientX + "px";
          cursor.style.top = e.clientY + "px";
        });

        document.querySelectorAll("a, button").forEach((el) => {
          el.addEventListener("mouseenter", () =>
            cursor.classList.add("hovering"),
          );
          el.addEventListener("mouseleave", () =>
            cursor.classList.remove("hovering"),
          );
        });
      };

      // 3.7. Ripple Effect
      const initRipple = () => {
        const buttons = document.querySelectorAll(".ripple-effect, .btn");
        buttons.forEach((btn) => {
          btn.addEventListener("click", function (e) {
            let x = e.clientX - e.target.getBoundingClientRect().left;
            let y = e.clientY - e.target.getBoundingClientRect().top;
            let ripples = document.createElement("span");
            ripples.style.left = x + "px";
            ripples.style.top = y + "px";
            ripples.classList.add("ripple");
            this.appendChild(ripples);
            setTimeout(() => ripples.remove(), 600);
          });
        });
      };

      // 3.8. Testimonial Slider
      const initSlider = () => {
        const slides = document.querySelectorAll(".testi-slide");
        if (slides.length === 0) return;
        let current = 0;
        setInterval(() => {
          slides[current].classList.remove("active");
          current = (current + 1) % slides.length;
          slides[current].classList.add("active");
        }, 5000);
      };

      // 3.9. Toast Notification
      // const showToast = (message) => {
      //   const container = document.getElementById("toast-container");
      //   const toast = document.createElement("div");
      //   toast.className = "toast";
      //   toast.textContent = message;
      //   container.appendChild(toast);
      //   setTimeout(() => toast.remove(), 3000);
      // };
      // 3.9. Toast Notification (iPhone Style)
      const showToast = (message) => {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = "toast";
        // Menambahkan ikon dan pesan
        toast.innerHTML = `<span>${message}</span>`;

        container.appendChild(toast);

        // Hapus elemen setelah animasi selesai (total animasi + durasi tampil sekitar 4 detik)
        setTimeout(() => toast.remove(), 4000);
      };

      // 3.10. Project Modal
      const initModalListeners = () => {
        const modal = document.getElementById("project-modal");
        const modalBody = document.getElementById("modal-body");

        document.querySelectorAll(".view-detail-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const index = e.target.getAttribute("data-index");
            // Karena index bisa berubah saat filter, lebih baik cari dari title.
            // Kita asumsikan struktur grid saat ini.
            const card = e.target.closest(".project-card");
            const title = card.querySelector(".project-title").textContent;
            const proj = portfolio.projects.find((p) => p.title === title);

            if (proj) {
              modalBody.innerHTML = `
                            <h2>${proj.title}</h2>
                            <p class="project-tags" style="margin-top:10px">${proj.category} | ${proj.tech}</p>
                            <img src="${proj.image}" alt="${proj.title}" style="width:100%; border-radius:8px; margin: 15px 0;">
                            <p>${proj.description}</p>
                            <div style="margin-top: 20px; display:flex; gap:10px;">
                                ${proj.demo !== "#" ? `<a href="${proj.demo}" target="_blank" class="btn btn-primary">Lihat Demo</a>` : ""}
                                ${proj.github !== "#" ? `<a href="${proj.github}" target="_blank" class="btn btn-outline">Source Code</a>` : ""}
                            </div>
                        `;
              modal.classList.add("active");
            }
          });
        });
      };

      const initModal = () => {
        const modal = document.getElementById("project-modal");
        document
          .getElementById("close-modal")
          .addEventListener("click", () => modal.classList.remove("active"));
        window.addEventListener("click", (e) => {
          if (e.target === modal) modal.classList.remove("active");
        });
        initModalListeners();
      };

      // 3.11. Copy Email Feature
      const initCopyEmail = () => {
        const emailBtn = document.getElementById("copy-email");
        emailBtn.addEventListener("click", (e) => {
          e.preventDefault(); // Mencegah membuka mail client langsung (opsional)
          navigator.clipboard.writeText(portfolio.contacts.email).then(() => {
            showToast("Email berhasil disalin ke clipboard!");
          });
        });
      };

      // 3.12. Back To Top
      document.getElementById("back-to-top").addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      /* =========================================================================
           4. INISIALISASI UTAMA
           ========================================================================= */
      window.addEventListener("DOMContentLoaded", () => {
        // 1. Build DOM
        buildPage();

        // 2. Initialize Features
        initTheme();
        initMobileMenu();
        initTyping();
        initProjectFilters();
        initModal();
        initCopyEmail();
        initSlider();

        // 3. Remove loader & Start Observes
        window.onload = () => {
          document.getElementById("loader").style.opacity = "0";
          setTimeout(() => {
            document.getElementById("loader").style.display = "none";
            initObservers();
            initCursor();
            initRipple();
            showToast("Selamat datang di portofolio saya!");
          }, 500);
        };
      });
    </script>
  </body>
</html>
